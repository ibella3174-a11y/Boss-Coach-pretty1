<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour | Account Support</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- CORE STYLES --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { 
            background-color: #000; 
            color: #fff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* --- FIXED NAVBAR --- */
        .navbar {
            position: fixed; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 5%; background-color: #000; z-index: 2000;
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .back-link {
            color: #fff; text-decoration: none; font-size: 1rem; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            background-color: rgba(255, 255, 255, 0.05); border-radius: 50%; transition: 0.3s;
        }
        .back-link:hover { background-color: rgba(255, 255, 255, 0.15); color: #dbb445; }
        
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .flower-icon { font-size: 2rem; }
        .glamour-text { font-size: 1.3rem; font-weight: 700; }

        /* --- CENTERED ERROR CONTENT --- */
        .error-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            text-align: center;
        }

        .error-card {
            max-width: 450px;
            width: 100%;
        }

        .icon-box {
            font-size: 4rem;
            color: #dbb445;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .error-message {
            font-size: 1.05rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* --- TELEGRAM BUTTON --- */
        .telegram-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background-color: #0088cc; /* Telegram Blue */
            color: #fff;
            text-decoration: none;
            padding: 18px;
            border-radius: 18px;
            font-weight: 900;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.2);
        }

        .telegram-btn:hover {
            transform: translateY(-3px);
            background-color: #0099e6;
            box-shadow: 0 15px 25px rgba(0, 136, 204, 0.3);
        }

        .alternative-action {
            margin-top: 30px;
            font-size: 0.9rem;
        }

        .alternative-action a {
            color: #dbb445;
            text-decoration: none;
            font-weight: 700;
        }

        /* --- BACKGROUND ACCENT --- */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(219, 180, 69, 0.1) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <header class="navbar">
        <div class="nav-left">
            <a href="login.html" class="back-link">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div class="logo-area">
                <span class="flower-icon">❀</span> 
                <span class="glamour-text">Glamour</span>
            </div>
        </div>
    </header>

    <main class="error-wrapper">
        <div class="error-card">
            <div class="icon-box">
                <i class="fa-solid fa-user-slash"></i>
            </div>
            
            <h1 class="error-title">Account Not Found</h1>
            
            <p class="error-message">
                We couldn't locate an account matching those details. To recover your access or verify your premium status, please contact our support admin directly.
            </p>

            <a href="https://t.me/Bosscoachpretty1" target="_blank" class="telegram-btn">
                <i class="fa-brands fa-telegram"></i>
                MESSAGE ADMIN
            </a>

            <div class="alternative-action">
                <p>Remembered your details? <a href="login.html">Try Login Again</a></p>
            </div>
        </div>
    </main>

</body>
</html>
